name: Build Yoga 9 15IMH5 Kexts

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if no updates'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: build-kexts
  cancel-in-progress: false

env:
  CONFIG_PATH: config/device-config.json
  SHA_PATH: last-build-sha.json
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
    steps:
      - uses: actions/checkout@v5

      - name: Check for updates
        id: check
        env:
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_SHA_PATH: /tmp/current-sha.json
        run: python3 scripts/check-updates.py

      - name: Upload current SHA
        uses: actions/upload-artifact@v5
        with:
          name: current-sha
          path: /tmp/current-sha.json

  build-lilu:
    needs: check-updates
    if: needs.check-updates.outputs.needs_build == 'true'
    runs-on: macos-15
    steps:
      - name: Clone Lilu + MacKernelSDK
        run: |
          git clone --depth 1 https://github.com/acidanthera/Lilu.git
          git clone --depth 1 https://github.com/acidanthera/MacKernelSDK.git
          cd Lilu
          ln -s ../MacKernelSDK MacKernelSDK
          xcodebuild -configuration Debug -arch x86_64 CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          mkdir -p /tmp/lilu-sdk
          cp -R build/Debug/Lilu.kext /tmp/lilu-sdk/

      - name: Upload Lilu SDK
        uses: actions/upload-artifact@v5
        with:
          name: lilu-sdk
          path: /tmp/lilu-sdk/

      - name: Upload MacKernelSDK
        uses: actions/upload-artifact@v5
        with:
          name: mackernelsdk
          path: MacKernelSDK

  build-wifi:
    needs: [check-updates, build-lilu]
    if: needs.check-updates.outputs.needs_build == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Download MacKernelSDK
        uses: actions/download-artifact@v5
        with:
          name: mackernelsdk
          path: /tmp/mackernelsdk

      - name: Clone itlwm
        run: |
          git clone --depth 1 https://github.com/OpenIntelWireless/itlwm.git
          cp -R /tmp/mackernelsdk itlwm/MacKernelSDK

      - name: Build & minimize AirportItlwm
        env:
          SOURCE_DIR: itlwm
          OUTPUT_DIR: build-output
        run: python3 scripts/minimize-airportitlwm.py

      - name: Upload AirportItlwm
        uses: actions/upload-artifact@v5
        with:
          name: airportitlwm
          path: build-output/

  build-bt:
    needs: [check-updates, build-lilu]
    if: needs.check-updates.outputs.needs_build == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Download Lilu SDK
        uses: actions/download-artifact@v5
        with:
          name: lilu-sdk
          path: /tmp/lilu-sdk

      - name: Download MacKernelSDK
        uses: actions/download-artifact@v5
        with:
          name: mackernelsdk
          path: /tmp/mackernelsdk

      - name: Clone IntelBluetoothFirmware
        run: |
          git clone --depth 1 https://github.com/OpenIntelWireless/IntelBluetoothFirmware.git
          cp -R /tmp/mackernelsdk IntelBluetoothFirmware/MacKernelSDK
          cp -R /tmp/lilu-sdk/Lilu.kext IntelBluetoothFirmware/

      - name: Build & minimize IntelBT
        env:
          SOURCE_DIR: IntelBluetoothFirmware
          OUTPUT_DIR: build-output
        run: python3 scripts/minimize-intelbt.py

      - name: Upload IntelBT
        uses: actions/upload-artifact@v5
        with:
          name: intelbt
          path: build-output/

  build-alc:
    needs: [check-updates, build-lilu]
    if: needs.check-updates.outputs.needs_build == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Download Lilu SDK
        uses: actions/download-artifact@v5
        with:
          name: lilu-sdk
          path: /tmp/lilu-sdk

      - name: Download MacKernelSDK
        uses: actions/download-artifact@v5
        with:
          name: mackernelsdk
          path: /tmp/mackernelsdk

      - name: Clone AppleALC
        run: |
          git clone --depth 1 https://github.com/acidanthera/AppleALC.git
          cp -R /tmp/mackernelsdk AppleALC/MacKernelSDK
          cp -R /tmp/lilu-sdk/Lilu.kext AppleALC/

      - name: Build & minimize AppleALC
        env:
          SOURCE_DIR: AppleALC
          OUTPUT_DIR: build-output
          PATCHES_DIR: patches/applealc
        run: python3 scripts/minimize-applealc.py

      - name: Upload AppleALC
        uses: actions/upload-artifact@v5
        with:
          name: applealc
          path: build-output/

  build-yogasmc:
    needs: [check-updates, build-lilu]
    if: needs.check-updates.outputs.needs_build == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Download Lilu SDK
        uses: actions/download-artifact@v5
        with:
          name: lilu-sdk
          path: /tmp/lilu-sdk

      - name: Download MacKernelSDK
        uses: actions/download-artifact@v5
        with:
          name: mackernelsdk
          path: /tmp/mackernelsdk

      - name: Clone YogaSMC
        run: |
          git clone --depth 1 https://github.com/zhen-zen/YogaSMC.git
          cp -R /tmp/mackernelsdk YogaSMC/MacKernelSDK
          cp -R /tmp/lilu-sdk/Lilu.kext YogaSMC/
          cd YogaSMC
          git clone --depth 1 https://github.com/acidanthera/VirtualSMC.git
          cd VirtualSMC
          ln -s ../MacKernelSDK MacKernelSDK
          ln -s ../Lilu.kext Lilu.kext
          xcodebuild -target VirtualSMC -configuration Debug -arch x86_64 CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          cp -R build/Debug/VirtualSMC.kext ../

      - name: Build & minimize YogaSMC
        env:
          SOURCE_DIR: YogaSMC
          OUTPUT_DIR: build-output
        run: python3 scripts/minimize-yogasmc.py

      - name: Upload YogaSMC
        uses: actions/upload-artifact@v5
        with:
          name: yogasmc
          path: build-output/

  download-prebuilt:
    needs: check-updates
    if: needs.check-updates.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download prebuilt kexts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/download-prebuilt.py

      - name: Upload prebuilt
        uses: actions/upload-artifact@v5
        with:
          name: prebuilt
          path: build-output/

  check-opencore:
    runs-on: ubuntu-latest
    outputs:
      opencore_updated: ${{ steps.check.outputs.opencore_updated }}
      opencore_version: ${{ steps.check.outputs.opencore_version }}
    steps:
      - uses: actions/checkout@v5

      - name: Check OpenCore updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_CONFIG: EFI/OC/config.plist
          OUTPUT_DIR: build-output/opencore
        run: python3 scripts/check-opencore.py

      - name: Upload OpenCore artifacts
        uses: actions/upload-artifact@v5
        if: steps.check.outputs.opencore_updated == 'true'
        with:
          name: opencore
          path: build-output/opencore/EFI/

  release:
    needs: [build-lilu, build-wifi, build-bt, build-alc, build-yogasmc, download-prebuilt, check-opencore]
    if: always() && needs.build-lilu.result != 'failure' && needs.build-wifi.result != 'failure' && needs.build-bt.result != 'failure' && needs.build-alc.result != 'failure' && needs.build-yogasmc.result != 'failure' && needs.download-prebuilt.result != 'failure' && (needs.build-lilu.result == 'success' || needs.build-wifi.result == 'success' || needs.build-bt.result == 'success' || needs.build-alc.result == 'success' || needs.build-yogasmc.result == 'success' || needs.download-prebuilt.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get date
        id: date
        run: |
          echo "date=$(TZ=Asia/Shanghai date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "time=$(TZ=Asia/Shanghai date +%H%M)" >> "$GITHUB_OUTPUT"

      - name: Download kext artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: '{airportitlwm,intelbt,applealc,yogasmc,prebuilt}'
          path: all-artifacts

      - name: Download OpenCore artifacts
        uses: actions/download-artifact@v5
        if: needs.check-opencore.outputs.opencore_updated == 'true'
        with:
          name: opencore
          path: opencore-artifact

      - name: Organize kexts
        run: |
          mkdir -p release/Kexts
          find all-artifacts -name "*.kext" -maxdepth 3 -exec cp -r {} release/Kexts/ \;
          # Copy custom USBMap.kext (Tahoe+ version, without dock scenario)
          cp -r "USB定制/Tahoe+/不接雷电扩展坞/MacBookPro16,1/USBMap.kext" release/Kexts/ 2>/dev/null || true
          ls -la release/Kexts/

      - name: Assemble EFI
        run: |
          mkdir -p release/EFI/BOOT
          mkdir -p release/EFI/OC/ACPI
          mkdir -p release/EFI/OC/Drivers
          mkdir -p release/EFI/OC/Kexts

          # Copy OpenCore files (from artifact if updated, else from repo)
          if [ -d "opencore-artifact" ]; then
            cp opencore-artifact/BOOT/BOOTx64.efi release/EFI/BOOT/ 2>/dev/null || true
            cp opencore-artifact/OC/OpenCore.efi release/EFI/OC/ 2>/dev/null || true
            cp -r opencore-artifact/OC/Drivers/*.efi release/EFI/OC/Drivers/ 2>/dev/null || true
          else
            # Fallback: copy from repo's EFI if exists
            cp EFI/BOOT/BOOTx64.efi release/EFI/BOOT/ 2>/dev/null || true
            cp EFI/OC/OpenCore.efi release/EFI/OC/ 2>/dev/null || true
            cp -r EFI/OC/Drivers/*.efi release/EFI/OC/Drivers/ 2>/dev/null || true
          fi

          # Copy ACPI (SSDTs)
          cp patches/ssdt/*.aml release/EFI/OC/ACPI/ 2>/dev/null || true

          # Copy Kexts
          cp -r release/Kexts/* release/EFI/OC/Kexts/ 2>/dev/null || true

          # Copy config.plist (preserve existing)
          cp EFI/OC/config.plist release/EFI/OC/ 2>/dev/null || true

          # Copy Resources if exists
          cp -r EFI/OC/Resources release/EFI/OC/ 2>/dev/null || true

          echo "=== EFI structure ==="
          find release/EFI -type f | sort | head -50

      - name: Create archives
        run: |
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          cd release

          # EFI zip
          zip -r "../Yoga-9-15IMH5-EFI-${DATE}.zip" EFI/

          # Kexts-only zip
          zip -r "../Yoga-9-15IMH5-Kexts-${DATE}.zip" Kexts/

          cd Kexts
          for kext in AirportItlwm.kext AppleALC.kext; do
            [ -d "$kext" ] && zip -r "../../${kext%.kext}-${DATE}.zip" "$kext" || true
          done
          if [ -d IntelBluetoothFirmware.kext ] || [ -d IntelBTPatcher.kext ]; then
            bt_targets="IntelBluetoothFirmware.kext IntelBTPatcher.kext"
            [ -d BlueToolFixup.kext ] && bt_targets="$bt_targets BlueToolFixup.kext"
            zip -r "../../IntelBT-${DATE}.zip" $bt_targets
          fi

      - name: Update last-build-sha.json
        uses: actions/download-artifact@v5
        with:
          name: current-sha
          path: /tmp/

      - name: Commit updated SHA
        run: |
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          cp /tmp/current-sha.json last-build-sha.json
          python3 -c "
          import json
          with open('last-build-sha.json') as f: d = json.load(f)
          d['build_date'] = '${DATE}'
          with open('last-build-sha.json', 'w') as f: json.dump(d, f, indent=2)
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last-build-sha.json
          git diff --cached --quiet || git commit -m "Update last-build-sha for ${DATE}"
          git push

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kexts-${{ steps.date.outputs.date }}.${{ steps.date.outputs.time }}.${{ github.run_number }}
          name: "Yoga 9 15IMH5 Kexts Build (${{ steps.date.outputs.date }} ${{ steps.date.outputs.time }} #${{ github.run_number }})"
          body: |
            Automated kext build for Yoga 9 15IMH5 (Lenovo Yoga 9 15IMH5, i9-10980HK)

            **Self-compiled (from upstream master):**
            - AirportItlwm: minimized (IOPCIMatch=0x06F08086, firmware=QuZ-a0-hr-b0-68)
            - IntelBluetoothFirmware: minimized (personality=_0026, firmware=ibt-18-*) + BLE fix patch
            - IntelBTPatcher: with BLE fix patch
            - AppleALC: minimized (codec=ALC298, layout=98, custom layout98 injected)
            - YogaSMC: built from upstream master (v2.0.0)

            **Nightly Build ([ClayMoreBoy/Hackintosh-Kext-Factory](https://github.com/ClayMoreBoy/Hackintosh-Kext-Factory)):**
            - WhateverGreen, VirtualSMC, RestrictEvents, NVMeFix, VoodooPS2

            **Official Release:**
            - Lilu, VoodooI2C, BlueToolFixup, ECEnabler

            **OCLP ([dortania/OpenCore-Legacy-Patcher](https://github.com/dortania/OpenCore-Legacy-Patcher)):**
            - AMFIPass, IO80211FamilyLegacy, IOSkywalkFamily

            **Fork:**
            - HoRNDIS: [TomHeaven/HoRNDIS](https://github.com/TomHeaven/HoRNDIS)
          files: |
            Yoga-9-15IMH5-EFI-*.zip
            Yoga-9-15IMH5-Kexts-*.zip
            AirportItlwm-*.zip
            IntelBT-*.zip
            AppleALC-*.zip
